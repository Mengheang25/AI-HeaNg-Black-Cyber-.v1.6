<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeaNg[Black-Cyber] · Admin Dashboard</title>
    
    <link rel="icon" type="image/png" href="public/worm_icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .stat-card {
            background: linear-gradient(135deg, rgba(220, 38, 38, 0.1) 0%, rgba(153, 27, 27, 0.1) 100%);
            border: 1px solid rgba(220, 38, 38, 0.3);
            padding: 24px;
            border-radius: 16px;
            color: white;
        }
        
        .user-row {
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background 0.2s;
        }
        
        .user-row:hover {
            background: rgba(255, 255, 255, 0.08);
        }
        
        .btn-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }
        
        .btn-block {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }
        
        .btn-block:hover {
            background: rgba(239, 68, 68, 0.4);
        }
        
        .btn-unblock {
            background: rgba(34, 197, 94, 0.2);
            color: #86efac;
        }
        
        .btn-unblock:hover {
            background: rgba(34, 197, 94, 0.4);
        }
        
        .badge-status {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .badge-active {
            background: rgba(34, 197, 94, 0.2);
            color: #86efac;
        }
        
        .badge-blocked {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #18181b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 32px;
            max-width: 400px;
            color: white;
        }
        
        .loading-spinner {
            border: 2px solid rgba(220, 38, 38, 0.2);
            border-top: 2px solid #dc2626;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-950">
    <!-- Header -->
    <header class="border-b border-gray-800 bg-gray-900 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="public/worm.png" alt="Logo" class="w-8 h-8 rounded-full" onerror="this.src='https://placehold.co/32x32?text=🐛'">
                <h1 class="text-xl font-bold text-white">Admin Dashboard</h1>
            </div>
            <button onclick="handleLogout()" class="flex items-center gap-2 px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg transition">
                <i class="fa-solid fa-sign-out-alt"></i>Logout
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-6 py-8">
        <!-- Stats Section -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="stat-card">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-300 text-sm">Total Users</p>
                        <p class="text-4xl font-bold mt-2" id="stat-total">0</p>
                    </div>
                    <i class="fa-solid fa-users text-4xl text-red-500 opacity-20"></i>
                </div>
            </div>

            <div class="stat-card">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-300 text-sm">Active Users</p>
                        <p class="text-4xl font-bold mt-2" id="stat-active">0</p>
                    </div>
                    <i class="fa-solid fa-circle-check text-4xl text-green-500 opacity-20"></i>
                </div>
            </div>

            <div class="stat-card">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-300 text-sm">Blocked Users</p>
                        <p class="text-4xl font-bold mt-2" id="stat-blocked">0</p>
                    </div>
                    <i class="fa-solid fa-ban text-4xl text-orange-500 opacity-20"></i>
                </div>
            </div>
        </div>

        <!-- Users List Section -->
        <div class="glass-effect rounded-xl p-6">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-bold text-white">Manage Users</h2>
                <input type="text" id="search-users" placeholder="Search by name or email..." 
                       class="bg-gray-800 text-white px-4 py-2 rounded-lg border border-gray-700 focus:border-red-500 focus:outline-none w-64">
            </div>

            <!-- Users Table -->
            <div id="users-container" class="space-y-2 max-h-96 overflow-y-auto">
                <div class="text-center text-gray-400 py-8">
                    <div class="loading-spinner mx-auto mb-2"></div>
                    <p>Loading users...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Action Confirmation Modal -->
    <div id="confirm-modal" class="modal">
        <div class="modal-content">
            <h3 class="text-xl font-bold mb-4" id="modal-title">Confirm Action</h3>
            <p class="text-gray-300 mb-6" id="modal-message"></p>
            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 px-4 py-2 bg-gray-700 hover:bg-gray-600 text-white rounded-lg transition">
                    Cancel
                </button>
                <button onclick="confirmAction()" class="flex-1 px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg transition">
                    Confirm
                </button>
            </div>
        </div>
    </div>

    <script>
        // ==================== Admin Dashboard Logic ====================
        
        let allUsers = [];
        let pendingAction = null;

        // Check authentication
        window.addEventListener('load', async () => {
            const token = localStorage.getItem('heang_token');
            const user = JSON.parse(localStorage.getItem('heang_user') || '{}');

            if (!token || user.email !== 'mengheangkh25@gmail.com') {
                window.location.href = '/auth.html';
                return;
            }

            loadUsers();
        });

        async function loadUsers() {
            try {
                const response = await fetch('/api/users', {
                    headers: {
                        'Authorization': 'Bearer ' + localStorage.getItem('heang_token')
                    }
                });

                const data = await response.json();
                if (data.success) {
                    allUsers = data.users || [];
                    renderUsers(allUsers);
                    updateStats();
                } else {
                    showError('Failed to load users');
                }
            } catch (error) {
                console.error('Error loading users:', error);
                showError('Error loading users');
            }
        }

        function renderUsers(users) {
            const container = document.getElementById('users-container');
            
            if (users.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-400 py-8">No users found</div>';
                return;
            }

            container.innerHTML = users.map(user => `
                <div class="user-row">
                    <div class="flex-1">
                        <div class="font-semibold text-white">${escapeHtml(user.name)}</div>
                        <div class="text-sm text-gray-400">${escapeHtml(user.email)}</div>
                        <div class="text-xs text-gray-500 mt-1">Joined: ${new Date(user.created_at).toLocaleDateString()}</div>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="badge-status ${user.blocked ? 'badge-blocked' : 'badge-active'}">
                            ${user.blocked ? '🔒 Blocked' : '✅ Active'}
                        </span>
                        <button class="btn-icon ${user.blocked ? 'btn-unblock' : 'btn-block'}" 
                                onclick="openConfirmModal('${user.email}', ${user.blocked})">
                            <i class="fa-solid fa-${user.blocked ? 'unlock' : 'lock'}"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function updateStats() {
            const total = allUsers.length;
            const active = allUsers.filter(u => !u.blocked).length;
            const blocked = allUsers.filter(u => u.blocked).length;

            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-active').textContent = active;
            document.getElementById('stat-blocked').textContent = blocked;
        }

        function openConfirmModal(userEmail, isBlocked) {
            const user = allUsers.find(u => u.email === userEmail);
            const modal = document.getElementById('confirm-modal');
            const title = document.getElementById('modal-title');
            const message = document.getElementById('modal-message');

            if (isBlocked) {
                title.textContent = 'Unblock User?';
                message.textContent = `Are you sure you want to unblock ${user.name}? They will be able to use the chat again.`;
            } else {
                title.textContent = 'Block User?';
                message.textContent = `Are you sure you want to block ${user.name}? They won't be able to access the chat.`;
            }

            pendingAction = { userEmail, isBlocked };
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('confirm-modal').classList.remove('active');
            pendingAction = null;
        }

        async function confirmAction() {
            if (!pendingAction) return;

            const { userEmail, isBlocked } = pendingAction;
            closeModal();

            try {
                const response = await fetch('/api/users', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + localStorage.getItem('heang_token')
                    },
                    body: JSON.stringify({
                        action: isBlocked ? 'unblock' : 'block',
                        email: userEmail
                    })
                });

                const data = await response.json();
                if (data.success) {
                    loadUsers();
                    showSuccess(isBlocked ? 'User unblocked' : 'User blocked');
                } else {
                    showError(data.error || 'Action failed');
                }
            } catch (error) {
                showError('Error: ' + error.message);
            }
        }

        // Search functionality
        document.getElementById('search-users').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = allUsers.filter(u => 
                u.name.toLowerCase().includes(query) || 
                u.email.toLowerCase().includes(query)
            );
            renderUsers(filtered);
        });

        function handleLogout() {
            localStorage.removeItem('heang_token');
            localStorage.removeItem('heang_user');
            window.location.href = '/auth.html';
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function showError(message) {
            console.error(message);
            alert('❌ ' + message);
        }

        function showSuccess(message) {
            console.log(message);
            alert('✅ ' + message);
        }
    </script>
</body>
</html>
